<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScopeCanvas WebGL2 Demo</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #14171d; }
    #canvas { width: 100vw; height: 100vh; display: block; outline: none; }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    // Emscripten's GLFW port obtains its event target from Module.canvas.
    // A custom shell must provide it before the generated runtime starts.
    var Module = {
      canvas: document.getElementById('canvas')
    };
    Module.canvas.focus();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
